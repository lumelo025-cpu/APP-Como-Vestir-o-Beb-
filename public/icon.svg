<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Pastel Sky/Warmth Gradient -->
    <linearGradient id="warmPastel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F5" />
      <stop offset="100%" stop-color="#F6E8DF" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E29D93" />
      <stop offset="100%" stop-color="#D48C80" />
    </linearGradient>
    <filter id="gentleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8B5A2B" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Squircle Base Frame -->
  <rect width="512" height="512" rx="128" fill="url(#warmPastel)" />
  
  <!-- Subtle Inner Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#F1E0D4" stroke-width="4" stroke-dasharray="12,12" opacity="0.6" />

  <!-- Sun Element -->
  <circle cx="380" cy="130" r="48" fill="#FCE1BE" opacity="0.8" />
  <circle cx="380" cy="130" r="32" fill="#F8CBA1" />

  <!-- Cute Baby Bodysuit (Centered & Anchored) -->
  <g filter="url(#gentleShadow)" transform="translate(136, 120)">
    <!-- Shoulders and Body -->
    <path d="M40 50 C40 30, 200 30, 200 50 L200 160 C200 200, 160 210, 120 210 C80 210, 40 200, 40 160 Z" fill="url(#bodyGradient)" />
    
    <!-- Neck Sleeve Curve -->
    <path d="M85 50 C95 65, 145 65, 155 50" fill="none" stroke="#FFF5EE" stroke-width="8" stroke-linecap="round" />
    
    <!-- Hips and Bottom Snaps Layer -->
    <path d="M40 155 C40 230, 70 240, 120 240 C170 240, 200 230, 200 155 L180 155 C180 210, 150 215, 120 215 C90 215, 60 210, 60 155 Z" fill="#C57E73" />
    
    <!-- Legs Open Cutaways -->
    <path d="M60 215 C60 240, 95 245, 95 255" fill="none" stroke="#C57E73" stroke-width="6" stroke-linecap="round" />
    <path d="M180 215 C180 240, 145 245, 145 255" fill="none" stroke="#C57E73" stroke-width="6" stroke-linecap="round" />
    
    <!-- Bodysuit Decorative Heart -->
    <path d="M120 120 C120 120, 105 105, 105 92.5 C105 82.5, 112.5 75, 120 82.5 C127.5 75, 135 82.5, 135 92.5 C135 105, 120 120, 120 120 Z" fill="#FFF5EE" opacity="0.9" />
    
    <!-- Little snaps at the bottom -->
    <circle cx="102" cy="232" r="5" fill="#FFF5EE" />
    <circle cx="120" cy="234" r="5" fill="#FFF5EE" />
    <circle cx="138" cy="232" r="5" fill="#FFF5EE" />
  </g>

  <!-- Fluffy Friendly Cloud cuddling the Suit -->
  <g filter="url(#gentleShadow)">
    <path d="M300 320 C300 295, 330 280, 360 290 C372 270, 410 265, 430 285 C450 280, 475 295, 470 320 C485 330, 480 360, 460 365 C460 375, 310 375, 310 360 C290 355, 290 330, 300 320 Z" fill="#FFFFFF" opacity="0.95" />
    <circle cx="340" cy="335" r="3" fill="#D48C80" opacity="0.7" />
    <circle cx="360" cy="335" r="3" fill="#D48C80" opacity="0.7" />
    <path d="M344 345 C346 348, 354 348, 356 345" fill="none" stroke="#D48C80" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
